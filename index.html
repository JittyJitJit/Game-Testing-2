<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coal Express</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background-color: #1a1a1a;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui-container { margin-bottom: 15px; }

        #scoreBoard {
            font-size: 24px;
            color: #f1c40f;
            font-weight: bold;
            text-transform: uppercase;
        }

        canvas {
            border: 5px solid #333;
            background-color: #2c3e50;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #overlay {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            width: 400px;
            height: 400px;
            border-radius: 5px;
        }

        h2 { color: #e74c3c; margin-bottom: 10px; }

        button {
            padding: 10px 25px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { background-color: #2ecc71; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="scoreBoard">Score: <span id="scoreValue">0</span></div>
    </div>

    <div style="position: relative;">
        <div id="overlay">
            <h2>TRAIN CRASHED!</h2>
            <button onclick="resetGame()">Start New Run</button>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <p>Use Arrow Keys or WASD to Drive</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreValue");
        const overlay = document.getElementById("overlay");

        const box = 20;
        let score = 0;
        let gameActive = true;
        let train, coal, d;

        // Initialize game state
        function init() {
            score = 0;
            scoreElement.innerText = score;
            d = "RIGHT";
            gameActive = true;
            overlay.style.display = "none";
            
            // Initial Train position
            train = [
                {x: 9 * box, y: 10 * box},
                {x: 8 * box, y: 10 * box},
                {x: 7 * box, y: 10 * box}
            ];

            spawnCoal();
        }

        function spawnCoal() {
            coal = {
                x: Math.floor(Math.random() * 19 + 1) * box,
                y: Math.floor(Math.random() * 19 + 1) * box
            };
        }

        // Handle Controls
        document.addEventListener("keydown", direction);
        function direction(event) {
            let key = event.keyCode;
            if((key == 37 || key == 65) && d != "RIGHT") d = "LEFT";
            else if((key == 38 || key == 87) && d != "DOWN") d = "UP";
            else if((key == 39 || key == 68) && d != "LEFT") d = "RIGHT";
            else if((key == 40 || key == 83) && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            if (!gameActive) return;

            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Train
            for(let i = 0; i < train.length; i++) {
                ctx.fillStyle = (i == 0) ? "#f1c40f" : "#95a5a6"; // Gold head, silver cars
                ctx.fillRect(train[i].x, train[i].y, box, box);
                ctx.strokeStyle = "#2c3e50";
                ctx.strokeRect(train[i].x, train[i].y, box, box);
            }

            // Draw Coal
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(coal.x, coal.y, box, box);

            // Logic: Old head position
            let trainX = train[0].x;
            let trainY = train[0].y;

            if( d == "LEFT") trainX -= box;
            if( d == "UP") trainY -= box;
            if( d == "RIGHT") trainX += box;
            if( d == "DOWN") trainY += box;

            // Screen Wrapping Logic
            if (trainX < 0) trainX = canvas.width - box;
            else if (trainX >= canvas.width) trainX = 0;
            if (trainY < 0) trainY = canvas.height - box;
            else if (trainY >= canvas.height) trainY = 0;

            // Check if train eats coal
            if(trainX == coal.x && trainY == coal.y) {
                score += 10;
                scoreElement.innerText = score;
                spawnCoal();
            } else {
                train.pop(); // Remove tail
            }

            let newHead = { x: trainX, y: trainY };

            // Check Collision
            if(collision(newHead, train)) {
                gameActive = false;
                overlay.style.display = "flex";
            }

            train.unshift(newHead);
        }

        function resetGame() {
            init();
        }

        init();
        let game = setInterval(draw, 100);
    </script>
</body>
</html>
